appId: com.nursery.management
productName: Nursery & Autism Center Management System
directories:
  output: release
  buildResources: assets
files:
  - dist
  - dist-electron
  - package.json
  # Runtime assets the app reads/copies on first launch (branding logos, app icon, fonts).
  # Bundled inside the asar so the existing `path.join(__dirname, '../assets/...')` resolves.
  - assets/branding/**/*
  - assets/default-branding/**/*
win:
  target: nsis
  icon: assets/branding/icon.ico
mac:
  target: dmg
  icon: assets/branding/icon.icns
  category: public.app-category.business
linux:
  target: AppImage
  icon: assets/branding/icon.png
  category: Office
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Nursery Management System
